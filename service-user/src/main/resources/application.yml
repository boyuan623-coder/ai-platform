server:
  port: 8083

spring:
  application:
    name: service-user
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:mysql://localhost:3306/ai_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

dubbo:
  application:
    name: ${spring.application.name}
  protocol:
    name: dubbo
    port: 20883
  registry:
    address: nacos://localhost:8848
  consumer:
    check: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

app:
  storage:
    base-path: ./data

langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:your-deepseek-api-key-here}
      model-name: deepseek-chat
      temperature: 0.7
    streaming-chat-model:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:your-deepseek-api-key-here}
      model-name: deepseek-chat
      temperature: 0.7
  community:
    redis:
      host: localhost
      port: 6379
      index-name: app-chat-embeddings
