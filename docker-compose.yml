version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ai-platform-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: volunteer
    ports:
      - "3306:3306"
    volumes:
      - ./platform-bootstrap/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: ai-platform-redis
    ports:
      - "6379:6379"

  # 可选：Prometheus + Grafana 监控（Phase 2 微服务拆分后启用）
