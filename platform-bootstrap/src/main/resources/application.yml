server:
  port: 8080

spring:
  application:
    name: code-craftsman
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:mysql://localhost:3306/volunteer?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379

# DeepSeek（OpenAI 兼容接口）
langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:your-deepseek-api-key-here}
      model-name: deepseek-chat
      temperature: 0.7
    streaming-chat-model:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:your-deepseek-api-key-here}
      model-name: deepseek-chat
      temperature: 0.7
  community:
    redis:
      host: localhost
      port: 6379
      index-name: volunteer-embeddings

rag:
  documents-path: classpath:documents/*

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    com.chatbot: INFO
    dev.langchain4j: WARN
