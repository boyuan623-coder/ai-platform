server:
  port: 8080

spring:
  config:
    import: optional:classpath:application-secrets.yml
  application:
    name: code-craftsman
  autoconfigure:
    exclude:
      - dev.langchain4j.community.store.embedding.redis.spring.RedisEmbeddingStoreAutoConfiguration
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:mysql://localhost:3306/ai_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379

# DeepSeek（OpenAI 兼容接口）
langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:your-deepseek-api-key-here}
      model-name: deepseek-chat
      temperature: 0.7
    streaming-chat-model:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:your-deepseek-api-key-here}
      model-name: deepseek-chat
      temperature: 0.7
  community:
    redis:
      host: localhost
      port: 6379
      index-name: volunteer-embeddings

rag:
  documents-path: classpath:documents/*

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://localhost:9411/api/v2/spans}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    com.chatbot: INFO
    dev.langchain4j: WARN

app:
  storage:
    base-path: ./data
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost:8080
    allow-credentials: true
  cos:
    enabled: false
    endpoint: ${COS_ENDPOINT:}
    region: ${COS_REGION:ap-guangzhou}
    bucket: ${COS_BUCKET:}
    access-key: ${COS_ACCESS_KEY:}
    secret-key: ${COS_SECRET_KEY:}
    public-url-prefix: ${COS_PUBLIC_URL:}
    key-prefix: deploy
  selenium:
    enabled: false
    preview-base-url: http://localhost:8080
    viewport-width: 800
    viewport-height: 450
