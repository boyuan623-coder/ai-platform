# IDEA 本地开发配置（Run Configuration 使用 profile: local）
#
# 启动方式: scripts\start-redis.bat（需设置 REDIS_HOME 环境变量）
# 说明: Redis 用于会话记忆和缓存；RAG 向量库使用内存（见 LocalEmbeddingStoreConfig）
# API: DeepSeek（环境变量 DEEPSEEK_API_KEY）；RAG Embedding 使用本地模型

spring:
  autoconfigure:
    exclude:
      - dev.langchain4j.community.store.embedding.redis.spring.RedisEmbeddingStoreAutoConfiguration
  datasource:
    url: jdbc:mysql://localhost:3306/ai_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:root}
  data:
    redis:
      host: localhost
      port: 6379

# API Key 统一在 application.yml 或 application-secrets.yml 中配置

management:
  tracing:
    enabled: false

logging:
  level:
    com.chatbot: DEBUG
