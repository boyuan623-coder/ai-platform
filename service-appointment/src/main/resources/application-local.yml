# service-appointment 本地开发配置（Run Configuration 使用 profile: local）
#
# API: DeepSeek（环境变量 DEEPSEEK_API_KEY）；RAG Embedding 使用本地模型

spring:
  autoconfigure:
    exclude:
      - dev.langchain4j.community.store.embedding.redis.spring.RedisEmbeddingStoreAutoConfiguration
  datasource:
    url: jdbc:mysql://localhost:3306/volunteer_appointment?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:root}
  data:
    redis:
      host: localhost
      port: 6379

# API Key 通过环境变量 DEEPSEEK_API_KEY 配置

logging:
  level:
    com.chatbot: DEBUG
