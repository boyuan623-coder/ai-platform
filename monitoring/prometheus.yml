global:
  scrape_interval: 15s

scrape_configs:
  - job_name: platform-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['platform-gateway:8080']
  - job_name: service-user
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['service-user:8083']
  - job_name: service-codegen
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['service-codegen:8082']
  - job_name: service-appointment
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['service-appointment:8081']
